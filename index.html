<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大林聯合建築師事務所 會議室預約管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        // === 設定區 ===
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyt7Lfy8xj-9-0kI0y2P-mDfhC7pa74KeQ4cmyw9Hy48IdV495eaGNwvlwP7xEUFXyUwA/exec"; 
        const ADMIN_PASSWORD = "admin0408"; 

        const generateTimeOptions = () => {
            const options = [];
            for (let hour = 8; hour <= 20; hour++) {
                const hh = String(hour).padStart(2, '0');
                options.push(`${hh}:00`);
                options.push(`${hh}:30`);
            }
            return options;
        };
        const TIME_OPTIONS = generateTimeOptions();

        const formatDate = (input) => {
            if (!input) return "";
            try {
                const date = new Date(input);
                if (isNaN(date.getTime())) return String(input).split('T')[0];
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            } catch (e) {
                return String(input).split('T')[0];
            }
        };

        const formatTime = (input) => {
            if (!input) return "00:00";
            const str = String(input);
            try {
                if (str.includes('T')) {
                    const date = new Date(input);
                    const h = date.getHours();
                    const m = date.getMinutes();
                    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                }
                if (str.includes(':')) {
                    const parts = str.split(':');
                    const h = parts[0].trim().padStart(2, '0');
                    const m = parts[1].trim().slice(0, 2).padStart(2, '0');
                    return `${h}:${m}`;
                }
            } catch (e) { console.error(e); }
            return str;
        };

        const ROOMS = [
            { id: 'room-a', name: '會議室 901 (中型 10-15人)', color: 'bg-red-100 border-red-300 text-red-800' },
            { id: 'room-b', name: '會議室 902 (大型 10-20人)', color: 'bg-orange-100 border-orange-300 text-orange-800' },
            { id: 'room-c', name: '會議室 701 (中型 10-15人)暫無設備', color: 'bg-yellow-100 border-yellow-300 text-yellow-800' },
            { id: 'room-d', name: '會議室 702 (大型 10-20人)', color: 'bg-green-100 border-green-300 text-green-800' },
            { id: 'room-e', name: '會議室 703 (小型 6-8人)暫不開放', color: 'bg-blue-100 border-blue-300 text-blue-800' },
            { id: 'room-f', name: '會議室 704 (小型 6-8人)暫無設備', color: 'bg-purple-100 border-purple-300 text-purple-800' }
        ];

        const Icon = ({ name, size = 18, className = "", isCustom = false }) => {
            if (isCustom) {
                return (
                    <img 
                        src="https://lh3.google.com/u/0/d/1qc-oaNh8kQVx2FrBkUtnd0NTda6ScIDT=w1920-h953-iv2?auditContext=prefetch" 
                        alt="logo" 
                        style={{ width: '4em', height: '4em' }}
                        className={`object-contain inline-block align-bottom ${className}`}
                        onError={(e) => { e.target.src = 'https://via.placeholder.com/40?text=IMG'; }}
                    />
                );
            }
            const icons = {
                calendar: <React.Fragment><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></React.Fragment>,
                cloud: <path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.97-2.354-5.402-5.304-5.494A7 7 0 1 0 5 13.045c0 .015 0 .03.001.045C2.181 13.528 0 15.937 0 18.889c0 3.037 2.463 5.5 5.5 5.5h12z" />,
                "map-pin": <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0zM12 10a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />,
                clock: <React.Fragment><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></React.Fragment>,
                user: <React.Fragment><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></React.Fragment>,
                "chevron-left": <polyline points="15 18 9 12 15 6" />,
                "chevron-right": <polyline points="9 18 15 12 9 6" />,
                x: <React.Fragment><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></React.Fragment>,
                "loader-2": <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
                lock: <React.Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></React.Fragment>,
                unlock: <React.Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 9.9-1" /></React.Fragment>,
                edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} ${name === 'loader-2' ? 'animate-spin' : ''}`}>
                    {icons[name] || null}
                </svg>
            );
        };

        function App() {
            const [viewMode, setViewMode] = useState('daily');
            const [selectedDate, setSelectedDate] = useState(formatDate(new Date()));
            const [bookings, setBookings] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [notification, setNotification] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [editingBooking, setEditingBooking] = useState(null);

            const [formData, setFormData] = useState({
                roomId: 'room-a',
                date: formatDate(new Date()),
                startTime: '09:00',
                endTime: '10:00',
                title: '',
                user: ''
            });

            const showNotification = useCallback((message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            }, []);

            const fetchBookings = async () => {
                if (!SCRIPT_URL) return;
                setIsSyncing(true);
                try {
                    const response = await fetch(SCRIPT_URL);
                    const rawData = await response.json();
                    const normalizedData = rawData.map(item => {
                        const getVal = (possibleKeys) => {
                            const foundKey = Object.keys(item).find(k => possibleKeys.includes(k.toLowerCase()));
                            return foundKey ? item[foundKey] : null;
                        };
                        return {
                            id: String(getVal(['id', '編號']) || `temp-${Math.random()}`),
                            roomId: getVal(['roomid', 'room_id', '會議室']) || 'room-a',
                            date: formatDate(getVal(['date', 'bookingdate', '日期'])),
                            startTime: formatTime(getVal(['starttime', '開始時間'])),
                            endTime: formatTime(getVal(['endtime', '結束時間'])),
                            title: getVal(['title', '主題']) || '無標題',
                            user: getVal(['user', '預約者']) || '未知'
                        };
                    });
                    setBookings(normalizedData);
                } catch (error) {
                    showNotification("資料同步失敗", "error");
                } finally {
                    setIsSyncing(false);
                }
            };

            useEffect(() => {
                fetchBookings();
                const interval = setInterval(fetchBookings, 60000);
                return () => clearInterval(interval);
            }, []);

            const toggleAdmin = () => {
                if (isAdmin) {
                    setIsAdmin(false);
                    showNotification("已登出管理者模式");
                } else {
                    const pwd = prompt("請輸入管理者密碼：");
                    if (pwd === ADMIN_PASSWORD) {
                        setIsAdmin(true);
                        showNotification("已進入管理者模式");
                    } else if (pwd !== null) {
                        showNotification("密碼錯誤", "error");
                    }
                }
            };

            const checkConflict = (newBooking, excludeId = null) => {
                const start = newBooking.startTime;
                const end = newBooking.endTime;
                const conflicts = bookings.filter(b => 
                    b.id !== excludeId &&
                    b.date === newBooking.date && 
                    b.roomId === newBooking.roomId &&
                    start < b.endTime && end > b.startTime
                );
                return conflicts.length > 0 ? conflicts[0] : null;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const trimmedTitle = formData.title.trim();
                const trimmedUser = formData.user.trim();
                if (!trimmedTitle || !trimmedUser) return showNotification("請填寫主題與預約者", "error");
                if (formData.startTime >= formData.endTime) return showNotification("結束時間必須大於開始時間", "error");
                const conflict = checkConflict(formData);
                if (conflict) return showNotification(`時段衝突：[${conflict.startTime}-${conflict.endTime}] ${conflict.title}`, "error");

                setIsLoading(true);
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'add', data: { ...formData, title: trimmedTitle, user: trimmedUser, id: Date.now().toString() } })
                    });
                    if (response.ok) {
                        showNotification('預約成功！');
                        fetchBookings();
                        setFormData(prev => ({ ...prev, title: '', user: '' }));
                    }
                } catch (error) {
                    showNotification('連線失敗', 'error');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleUpdate = async () => {
                if (!editingBooking) return;
                const trimmedTitle = editingBooking.title.trim();
                const trimmedUser = editingBooking.user.trim();
                if (!trimmedTitle || !trimmedUser) return showNotification("欄位不可為空", "error");
                if (editingBooking.startTime >= editingBooking.endTime) return showNotification("結束時間必須大於開始時間", "error");
                
                const conflict = checkConflict(editingBooking, editingBooking.id);
                if (conflict) return showNotification(`修改衝突：[${conflict.startTime}-${conflict.endTime}] ${conflict.title}`, "error");

                setIsLoading(true);
                try {
                    await fetch(SCRIPT_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: 'delete', id: String(editingBooking.id) }) 
                    });
                    await fetch(SCRIPT_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: 'add', data: editingBooking }) 
                    });
                    
                    showNotification('資料已修改');
                    setEditingBooking(null);
                    fetchBookings();
                } catch (error) {
                    showNotification('更新失敗', 'error');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleDelete = async (id) => {
                if (!isAdmin) return;
                if (!confirm("確定要刪除嗎？")) return;
                setIsSyncing(true);
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: String(id) }) });
                    fetchBookings();
                    showNotification('已刪除');
                } catch (error) {
                    showNotification('刪除失敗', 'error');
                    setIsSyncing(false);
                }
            };

            const todaysBookings = useMemo(() => {
                return bookings.filter(b => b.date === selectedDate).sort((a, b) => a.startTime.localeCompare(b.startTime));
            }, [bookings, selectedDate]);

            const renderMonthCalendar = () => {
                const baseDate = new Date(selectedDate);
                const year = baseDate.getFullYear();
                const month = baseDate.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(<div key={`empty-${i}`} className="p-2 bg-gray-50/50"></div>);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dayBookings = bookings.filter(b => b.date === dateStr).sort((a, b) => a.startTime.localeCompare(b.startTime));
                    days.push(
                        <div key={dateStr} onClick={() => { setSelectedDate(dateStr); setViewMode('daily'); }} className={`min-h-[110px] p-1 border border-gray-100 cursor-pointer hover:bg-blue-50 flex flex-col ${dateStr === selectedDate ? 'bg-blue-50 ring-1 ring-blue-500 inset' : 'bg-white'}`}>
                            <div className={`text-xs font-bold text-center w-full pb-1 mb-1 border-b ${dateStr === formatDate(new Date()) ? 'text-blue-600' : 'text-gray-500'}`}>
                                {d}
                            </div>
                            <div className="flex-1 overflow-y-auto space-y-1 no-scrollbar w-full">
                                {dayBookings.map(b => {
                                    const room = ROOMS.find(r => r.id === b.roomId);
                                    const shortName = room ? room.name.replace(/會議室\s*/, '').split(' ')[0] : '';
                                    return (
                                        <div key={b.id} className={`text-[10px] leading-tight px-1 py-0.5 rounded truncate border ${room ? room.color : 'bg-gray-100'}`}>
                                            <span className="font-bold">{shortName}</span> {b.startTime}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    );
                }
                return (
                    <div className="grid grid-cols-7 gap-px bg-gray-200 border rounded-lg overflow-hidden">
                        {['日', '一', '二', '三', '四', '五', '六'].map(day => <div key={day} className="bg-gray-100 py-1 text-center text-[10px] font-bold text-gray-400">{day}</div>)}
                        {days}
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col">
                    <div className="max-w-6xl mx-auto w-full flex-grow">
                        
                        <header className="mb-6">
                            <div className="flex flex-col md:flex-row md:items-start justify-between gap-4">
                                <div className="flex flex-col items-start">
                                    <div className="flex items-center gap-3">
                                        <Icon name="calendar" isCustom={true} className="flex-shrink-0" />
                                        <h1 className="text-xl md:text-3xl font-bold text-gray-900 leading-none">大林聯合建築師事務所</h1>
                                    </div>
                                    <h2 className="text-gray-600 text-lg md:text-2xl font-bold mt-0.5">會議室預約管理系統 V1.2</h2>
                                    <div className="flex items-center gap-4 mt-3">
                                        <div className="flex items-center gap-2 text-gray-400 text-xs">
                                            <Icon name="cloud" size={14} />
                                            <span>{isSyncing ? "同步中..." : "雲端已連線"}</span>
                                        </div>
                                        <button onClick={toggleAdmin} className={`text-xs font-medium ${isAdmin ? 'text-green-600' : 'text-gray-400'}`}>
                                            <Icon name={isAdmin ? "unlock" : "lock"} size={12} className="inline mr-1" />
                                            {isAdmin ? "管理者模式" : "管理者登入"}
                                        </button>
                                    </div>
                                </div>
                                <div className="flex items-center bg-white rounded-lg shadow-sm border p-1 self-center md:self-start">
                                    <button onClick={() => {
                                        const d = new Date(selectedDate);
                                        d.setDate(d.getDate() - 1);
                                        setSelectedDate(formatDate(d));
                                    }} className="p-2 hover:bg-gray-100 rounded text-gray-400"><Icon name="chevron-left" /></button>
                                    <div className="px-4 font-bold text-gray-700">{selectedDate}</div>
                                    <button onClick={() => {
                                        const d = new Date(selectedDate);
                                        d.setDate(d.getDate() + 1);
                                        setSelectedDate(formatDate(d));
                                    }} className="p-2 hover:bg-gray-100 rounded text-gray-400"><Icon name="chevron-right" /></button>
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-1">
                                <div className="bg-white rounded-xl shadow-sm border p-6 sticky top-6">
                                    <h3 className="text-sm font-bold text-gray-800 mb-4 border-b pb-2">預約登記表</h3>
                                    <form onSubmit={handleSubmit} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider flex items-center gap-1"><Icon name="map-pin" size={14} /> 會議室</label>
                                            <select value={formData.roomId} onChange={e => setFormData({...formData, roomId: e.target.value})} className="w-full rounded border-gray-200 border p-2 bg-gray-50 text-sm outline-none focus:border-blue-500">
                                                {ROOMS.map(room => <option key={room.id} value={room.id}>{room.name}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider flex items-center gap-1"><Icon name="calendar" size={14} /> 日期</label>
                                            <input type="date" value={formData.date} onChange={e => {setFormData({...formData, date: e.target.value}); setSelectedDate(e.target.value);}} className="w-full rounded border-gray-200 border p-2 bg-gray-50 text-sm outline-none focus:border-blue-500" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-gray-400 mb-1 flex items-center gap-1"><Icon name="clock" size={14} /> 開始</label>
                                                <select value={formData.startTime} onChange={e => setFormData({...formData, startTime: e.target.value})} className="w-full rounded border-gray-200 border p-2 bg-gray-50 text-sm outline-none focus:border-blue-500">
                                                    {TIME_OPTIONS.map(time => <option key={time} value={time}>{time}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-gray-400 mb-1 flex items-center gap-1"><Icon name="clock" size={14} /> 結束</label>
                                                <select value={formData.endTime} onChange={e => setFormData({...formData, endTime: e.target.value})} className="w-full rounded border-gray-200 border p-2 bg-gray-50 text-sm outline-none focus:border-blue-500">
                                                    {TIME_OPTIONS.map(time => <option key={time} value={time}>{time}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 mb-1 flex items-center gap-1"><Icon name="edit" size={14} /> 會議主題</label>
                                            <input type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full rounded border-gray-200 border p-2 bg-gray-50 text-sm outline-none focus:border-blue-500" placeholder="請輸入會議主題" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 mb-1 flex items-center gap-1"><Icon name="user" size={14} /> 預約者</label>
                                            <input type="text" value={formData.user} onChange={e => setFormData({...formData, user: e.target.value})} className="w-full rounded border-gray-200 border p-2 bg-gray-50 text-sm outline-none focus:border-blue-500" placeholder="您的姓名+分機" />
                                        </div>
                                        <button type="submit" disabled={isLoading} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition flex items-center justify-center gap-2">
                                            {isLoading ? <Icon name="loader-2" size={18} /> : '登記'}
                                        </button>
                                    </form>
                                </div>
                            </div>

                            <div className="lg:col-span-2 space-y-6">
                                <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                                    <div className="bg-gray-50 border-b p-4 flex justify-between items-center">
                                        <h2 className="font-bold text-gray-700">預約詳情 ({selectedDate})</h2>
                                        <div className="flex bg-gray-200 p-1 rounded">
                                            <button onClick={() => setViewMode('daily')} className={`px-3 py-1 text-xs font-bold rounded ${viewMode === 'daily' ? 'bg-white text-blue-600' : 'text-gray-500'}`}>日視圖</button>
                                            <button onClick={() => setViewMode('monthly')} className={`px-3 py-1 text-xs font-bold rounded ${viewMode === 'monthly' ? 'bg-white text-blue-600' : 'text-gray-500'}`}>月視圖</button>
                                        </div>
                                    </div>
                                    <div className="p-6">
                                        {viewMode === 'daily' ? (
                                            <div className="space-y-6">
                                                {ROOMS.map(room => {
                                                    const roomBookings = todaysBookings.filter(b => b.roomId === room.id);
                                                    return (
                                                        <div key={room.id}>
                                                            <h3 className={`text-xs font-bold mb-2 px-2 py-0.5 rounded border inline-block ${room.color}`}>{room.name}</h3>
                                                            {roomBookings.length === 0 ? (
                                                                <p className="text-xs text-gray-300 italic ml-2">暫無預約</p>
                                                            ) : (
                                                                <div className="grid gap-2 mt-2">
                                                                    {roomBookings.map(b => (
                                                                        <div key={b.id} className="flex items-center justify-between p-3 bg-gray-50 rounded border border-gray-100 group">
                                                                            <div className="flex items-center gap-3">
                                                                                <span className="text-xs font-mono font-bold text-blue-600 bg-white px-2 py-1 rounded border">{b.startTime}-{b.endTime}</span>
                                                                                <span className="text-sm font-bold text-gray-700">{b.title} <span className="text-gray-400 font-normal ml-2">({b.user})</span></span>
                                                                            </div>
                                                                            {isAdmin && (
                                                                                <div className="flex items-center gap-2">
                                                                                    <button onClick={() => setEditingBooking(b)} className="text-gray-300 hover:text-blue-500 p-1 transition"><Icon name="edit" size={14} /></button>
                                                                                    <button onClick={() => handleDelete(b.id)} className="text-gray-300 hover:text-red-500 p-1 transition"><Icon name="x" size={14} /></button>
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ) : renderMonthCalendar()}

                                        {/* 新增的紅色提示字樣 */}
                                        <div className="mt-6 pt-4 border-t border-gray-100">
                                            <p className="text-[11px] text-red-500 font-medium">※ 如需修改或刪除預約資料，請聯絡管理者</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="mt-12 pt-4 border-t border-gray-200 text-right text-xs text-gray-400 space-y-1 pb-4">
                            <p>系統開發者：吳書緯 分機731、許卓嘉 分機734</p>
                            <p>9F管理者：張芸眉 分機502、李協華 分機501、鄭兆捷 分機243、廖詩華 分機241</p>
                            <p>7F管理者：陳惠琴 分機721、巫郁瑩 分機722、吳書緯 分機731</p>
                        </footer>
                    </div>

                    {/* 管理者編輯彈窗 */}
                    {editingBooking && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
                                <div className="bg-blue-600 p-4 text-white flex justify-between items-center font-bold">
                                    <span>修改預約資料</span>
                                    <button onClick={() => setEditingBooking(null)}><Icon name="x" /></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 mb-1">會議室</label>
                                        <select value={editingBooking.roomId} onChange={e => setEditingBooking({...editingBooking, roomId: e.target.value})} className="w-full border rounded p-2 text-sm bg-gray-50 focus:border-blue-500 outline-none">
                                            {ROOMS.map(room => <option key={room.id} value={room.id}>{room.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 mb-1">會議日期</label>
                                        <input type="date" value={editingBooking.date} onChange={e => setEditingBooking({...editingBooking, date: e.target.value})} className="w-full border rounded p-2 text-sm bg-gray-50 focus:border-blue-500 outline-none" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 mb-1">開始時間</label>
                                            <select value={editingBooking.startTime} onChange={e => setEditingBooking({...editingBooking, startTime: e.target.value})} className="w-full border rounded p-2 text-sm bg-gray-50 focus:border-blue-500 outline-none">
                                                {TIME_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 mb-1">結束時間</label>
                                            <select value={editingBooking.endTime} onChange={e => setEditingBooking({...editingBooking, endTime: e.target.value})} className="w-full border rounded p-2 text-sm bg-gray-50 focus:border-blue-500 outline-none">
                                                {TIME_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 mb-1">會議主題</label>
                                        <input type="text" value={editingBooking.title} onChange={e => setEditingBooking({...editingBooking, title: e.target.value})} className="w-full border rounded p-2 text-sm bg-gray-50 focus:border-blue-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 mb-1">預約者</label>
                                        <input type="text" value={editingBooking.user} onChange={e => setEditingBooking({...editingBooking, user: e.target.value})} className="w-full border rounded p-2 text-sm bg-gray-50 focus:border-blue-500 outline-none" />
                                    </div>
                                    <div className="flex gap-3 pt-4 border-t">
                                        <button onClick={() => setEditingBooking(null)} className="flex-1 py-2 text-gray-500 font-bold hover:bg-gray-100 rounded">取消</button>
                                        <button onClick={handleUpdate} disabled={isLoading} className="flex-1 py-2 bg-blue-600 text-white font-bold hover:bg-blue-700 rounded flex items-center justify-center gap-2">
                                            {isLoading ? <Icon name="loader-2" size={16} /> : '儲存修改'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className={`fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white font-bold transition-all z-[110] animate-in slide-in-from-bottom-5 ${notification.type === 'error' ? 'bg-red-500' : 'bg-green-500'}`}>
                            {notification.message}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
